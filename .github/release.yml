name: Release on tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"       >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package Chrome unpacked-extension zip
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          STAGE="stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          for entry in manifest.json manifest.webmanifest service-worker.js LICENSE README.md; do
            [ -e "$entry" ] && cp -r "$entry" "$STAGE/" || true
          done

          [ -f background.js ] && cp background.js "$STAGE/" || true

          for dir in popup options lib icons background; do
            [ -d "$dir" ] && cp -r "$dir" "$STAGE/" || true
          done

          rm -rf "$STAGE/.git" \
                 "$STAGE/.github" \
                 "$STAGE/tests" \
                 "$STAGE/ui-samples" \
                 "$STAGE/layout-samples" \
                 "$STAGE/preview_site" \
                 "$STAGE/lsk-preview" \
                 "$STAGE/docs" \
                 "$STAGE/lazy-sheep-king.zip"
          find "$STAGE" -name '*.test.mjs' -type f -delete || true

          ZIP="lazy-sheep-king-${VERSION}.zip"
          (cd "$STAGE" && zip -r "../$ZIP" .)
          ls -la "$ZIP"
          echo "ZIP_PATH=$ZIP" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.ver.outputs.tag }}
          tag_name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.ZIP_PATH }}
